version: "3.8"

# ╔══════════════════════════════════════════════════════════════╗
# ║  Stack MLOps — Période 1 — MovieLens Recommender           ║
# ║                                                              ║
# ║  Démarrage :  docker compose up -d                          ║
# ║  MLflow UI :  http://localhost:5000                         ║
# ║  MinIO UI  :  http://localhost:9001  (minioadmin/minioadmin)║
# ║  Jupyter   :  http://localhost:8888                         ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # ── 1. PostgreSQL — backend metadata MLflow ─────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: mlops_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER:     mlflow
      POSTGRES_PASSWORD: mlflow_password
      POSTGRES_DB:       mlflow
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init_postgres.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "mlflow"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── 2. MinIO — stockage objet S3-compatible ─────────────────────
  minio:
    image: minio/minio:latest
    container_name: mlops_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout:  5s
      retries:  5

  # ── 3. MinIO Init — création des buckets au démarrage ───────────
  minio-init:
    image: minio/mc:latest
    container_name: mlops_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/mlflow-artifacts &&
        mc mb --ignore-existing local/raw-data &&
        mc mb --ignore-existing local/processed-data &&
        echo '✅ Buckets MinIO créés : mlflow-artifacts, raw-data, processed-data'
      "

  # ── 4. MLflow — tracking server ─────────────────────────────────
  mlflow:
    build:
      context: ./infrastructure/docker/mlflow
    container_name: mlops_mlflow
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      minioadmin
      AWS_SECRET_ACCESS_KEY:  minioadmin
    ports:
      - "5000:5000"
    command: >
      mlflow server
        --backend-store-uri postgresql+psycopg2://mlflow:mlflow_password@postgres:5432/mlflow
        --default-artifact-root s3://mlflow-artifacts/
        --host 0.0.0.0
        --port 5000
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout:  5s
      retries:  5

  # ── 5. Jupyter — environnement de développement ─────────────────
  jupyter:
    build:
      context: ./infrastructure/docker/jupyter
    container_name: mlops_jupyter
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI:    http://mlflow:5000
      MLFLOW_S3_ENDPOINT_URL: http://minio:9000
      AWS_ACCESS_KEY_ID:      minioadmin
      AWS_SECRET_ACCESS_KEY:  minioadmin
      RATING_THRESHOLD:       "4"
      FEAST_REDIS_HOST:       redis
      FEAST_REDIS_PORT:       "6379"
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks  # Notebooks persistants
      - ./data:/home/jovyan/work/data            # Accès aux données
      - ./training:/home/jovyan/work/training    # Code d'entraînement

  # ── 6. Redis — online store Feast ──────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mlops_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout:  3s
      retries:  5

  # ── 7. Feast Materialize — job ponctuel ─────────────────────────
  feast-materialize:
    image: python:3.10-slim
    container_name: mlops_feast_materialize
    depends_on:
      redis:
        condition: service_healthy
    environment:
      FEAST_REDIS_HOST: redis
      FEAST_REDIS_PORT: "6379"
    volumes:
      - ./feast:/app/feast
      - ./data:/app/data
      - ./training:/app/training
    working_dir: /app
    command: >
      bash -c "
        pip install feast redis --quiet &&
        python feast/feast_materialize.py --validate
      "
    profiles:
      - feast   # Lancer avec : docker compose --profile feast up feast-materialize

volumes:
  postgres_data:
  minio_data:

  # ── 8. Airflow — orchestrateur des DAGs ─────────────────────────
  airflow-init:
    build:
      context: ./infrastructure/docker/airflow
    container_name: mlops_airflow_init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./feast:/opt/airflow/feast
      - ./training:/opt/airflow/training
      - ./models:/opt/airflow/models
    command: >
      bash -c "
        airflow db migrate &&
        airflow users create --username admin --password admin
          --firstname Admin --lastname MLOps
          --role Admin --email admin@movielens.com &&
        echo '✅ Airflow initialisé'
      "
    profiles:
      - airflow

  airflow-webserver:
    build:
      context: ./infrastructure/docker/airflow
    container_name: mlops_airflow_web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR:        LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES:   "false"
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
      MLFLOW_TRACKING_URI:            http://mlflow:5000
      MINIO_ENDPOINT:                 http://minio:9000
      MINIO_ACCESS_KEY:               minioadmin
      MINIO_SECRET_KEY:               minioadmin
      FEAST_REDIS_HOST:               redis
      FEAST_REDIS_PORT:               "6379"
      DRIFT_THRESHOLD:                "0.3"
      MIN_ACCURACY:                   "0.60"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./feast:/opt/airflow/feast
      - ./training:/opt/airflow/training
      - ./models:/opt/airflow/models
      - ./monitoring:/opt/airflow/monitoring
      - ./pipelines:/opt/airflow/pipelines
    ports:
      - "8080:8080"
    command: webserver
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 5
    profiles:
      - airflow

  airflow-scheduler:
    build:
      context: ./infrastructure/docker/airflow
    container_name: mlops_airflow_scheduler
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow_password@postgres:5432/airflow
      AIRFLOW__CORE__EXECUTOR:        LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES:   "false"
      MLFLOW_TRACKING_URI:            http://mlflow:5000
      MINIO_ENDPOINT:                 http://minio:9000
      MINIO_ACCESS_KEY:               minioadmin
      MINIO_SECRET_KEY:               minioadmin
      FEAST_REDIS_HOST:               redis
      DRIFT_THRESHOLD:                "0.3"
      MIN_ACCURACY:                   "0.60"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/plugins:/opt/airflow/plugins
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/opt/airflow/data
      - ./feast:/opt/airflow/feast
      - ./training:/opt/airflow/training
      - ./models:/opt/airflow/models
      - ./monitoring:/opt/airflow/monitoring
      - ./pipelines:/opt/airflow/pipelines
    command: scheduler
    profiles:
      - airflow

  # ── 9. FastAPI — API de recommandation ──────────────────────────
  fastapi:
    build:
      context: .
      dockerfile: infrastructure/docker/fastapi/Dockerfile
    container_name: mlops_fastapi
    restart: unless-stopped
    depends_on:
      mlflow:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MODEL_NAME:          naive-bayes-recommender
      MODEL_STAGE:         Production
      FEAST_REDIS_HOST:    redis
      FEAST_REDIS_PORT:    "6379"
      AWS_ACCESS_KEY_ID:   minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      MINIO_ENDPOINT:      http://minio:9000
      LOG_LEVEL:           info
      PORT:                "8000"
    volumes:
      - ./models:/app/models:ro
      - ./data:/app/data:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout:  5s
      retries:  5
      start_period: 30s
