[pytest]
testpaths   = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Sortie détaillée
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# Marqueurs personnalisés
markers =
    slow: tests lents (>5s)
    integration: tests d'intégration
    ml: tests de performance ML

# Timeout par test (si pytest-timeout installé)
# timeout = 120
