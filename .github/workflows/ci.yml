# .github/workflows/ci.yml
# Workflow CI — Exécuté sur chaque Pull Request et push sur main/develop
#
# Pipeline :
#   lint → unit-tests → ml-tests → api-tests → coverage-report
#
# Tous les jobs tournent en parallèle après lint.
# Un seul job "status" agrège le résultat final (requis par branch protection).

name: CI — Tests & Qualité

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened]

# Annuler les runs en cours si un nouveau commit arrive sur la même PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.10"
  # Désactiver les connexions réseau vers MLflow/MinIO/Redis durant les tests
  MLFLOW_TRACKING_URI: ""
  FEAST_REDIS_HOST:    ""
  MINIO_ENDPOINT:      ""

jobs:
  # ── 1. Lint & format ────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les outils de lint
        run: pip install ruff black --quiet

      - name: Ruff — linting
        run: |
          ruff check . \
            --exclude ".venv,data,models,airflow/logs" \
            --select E,W,F,I \
            --ignore E501,W503

      - name: Black — formatage
        run: |
          black --check --diff . \
            --exclude "(\.venv|data/|models/|airflow/logs)" \
            --line-length 100

  # ── 2. Tests unitaires ──────────────────────────────────────────────────
  unit-tests:
    name: Tests Unitaires
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances
        run: |
          pip install \
            scikit-learn==1.3.2 \
            pandas==2.1.4 \
            numpy==1.26.3 \
            scipy==1.12.0 \
            pytest==7.4.4 \
            pytest-cov==4.1.0 \
            --quiet

      - name: Exécuter les tests unitaires
        run: |
          pytest tests/unit/ \
            -v --tb=short \
            --cov=training \
            --cov=data \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term-missing \
            --junitxml=results-unit.xml

      - name: Uploader les résultats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: |
            results-unit.xml
            coverage-unit.xml

  # ── 3. Tests ML ─────────────────────────────────────────────────────────
  ml-tests:
    name: Tests ML (Performance modèle)
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances
        run: |
          pip install \
            scikit-learn==1.3.2 \
            pandas==2.1.4 \
            numpy==1.26.3 \
            scipy==1.12.0 \
            pytest==7.4.4 \
            pytest-cov==4.1.0 \
            --quiet

      - name: Préparer les données + entraîner le modèle
        run: |
          python training/train.py \
            --gaussian-var-smoothing 1e-2 \
            --bernoulli-alpha 1.0 \
            --gaussian-weight 0.6 \
            --bernoulli-weight 0.4 \
            --min-accuracy 0.60

      - name: Exécuter les tests ML
        run: |
          pytest tests/ml/ \
            -v --tb=short \
            --cov=training \
            --cov-report=xml:coverage-ml.xml \
            --junitxml=results-ml.xml

      - name: Uploader les métriques du modèle
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ml-test-results
          path: |
            results-ml.xml
            coverage-ml.xml
            models/naive_bayes_recommender.pkl

  # ── 4. Tests API ─────────────────────────────────────────────────────────
  api-tests:
    name: Tests API (serving)
    runs-on: ubuntu-22.04
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances
        run: |
          pip install \
            scikit-learn==1.3.2 \
            pandas==2.1.4 \
            numpy==1.26.3 \
            scipy==1.12.0 \
            pytest==7.4.4 \
            pytest-cov==4.1.0 \
            --quiet

      - name: Préparer le modèle
        run: python training/train.py --min-accuracy 0.60

      - name: Exécuter les tests API (via test_server stdlib)
        run: |
          pytest tests/api/ \
            -v --tb=short \
            --junitxml=results-api.xml

      - name: Uploader les résultats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: results-api.xml

  # ── 5. Tests d'intégration pipeline ─────────────────────────────────────
  integration-tests:
    name: Tests Intégration Pipeline
    runs-on: ubuntu-22.04
    needs: [unit-tests, ml-tests]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances
        run: |
          pip install \
            scikit-learn==1.3.2 \
            pandas==2.1.4 \
            numpy==1.26.3 \
            scipy==1.12.0 \
            pytest==7.4.4 \
            --quiet

      - name: Tests intégration (LocalPipelineRunner)
        run: |
          pytest tests/integration/ \
            -v --tb=short \
            --junitxml=results-integration.xml

      - name: Uploader les résultats
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: results-integration.xml

  # ── 6. Rapport de couverture global ──────────────────────────────────────
  coverage-report:
    name: Rapport Couverture
    runs-on: ubuntu-22.04
    needs: [unit-tests, ml-tests, api-tests]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Télécharger les rapports de couverture
        uses: actions/download-artifact@v7
        with:
          pattern: "*-test-results"
          merge-multiple: true

      - name: Publier les résultats de tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name:    "Résultats des tests"
          path:    "results-*.xml"
          reporter: java-junit
          fail-on-error: false

  # ── 7. Status check agrégé (requis par branch protection) ────────────────
  ci-status:
    name: CI Status
    runs-on: ubuntu-22.04
    needs: [unit-tests, ml-tests, api-tests, integration-tests]
    if: always()
    steps:
      - name: Vérifier que tous les jobs ont réussi
        run: |
          if [[ "${{ needs.unit-tests.result }}"       != "success" ]] ||
             [[ "${{ needs.ml-tests.result }}"         != "success" ]] ||
             [[ "${{ needs.api-tests.result }}"        != "success" ]] ||
             [[ "${{ needs.integration-tests.result }}" != "success" ]]; then
            echo "❌ Un ou plusieurs jobs CI ont échoué"
            echo "  unit-tests        : ${{ needs.unit-tests.result }}"
            echo "  ml-tests          : ${{ needs.ml-tests.result }}"
            echo "  api-tests         : ${{ needs.api-tests.result }}"
            echo "  integration-tests : ${{ needs.integration-tests.result }}"
            exit 1
          fi
          echo "✅ Tous les jobs CI ont réussi"
