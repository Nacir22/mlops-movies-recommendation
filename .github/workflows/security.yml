# .github/workflows/security.yml
# Workflow Sécurité & Qualité
#
# Déclenché par :
#   - Push sur main/develop
#   - PR vers main/develop
#   - Cron : dimanche 03h00 UTC (scan hebdomadaire complet)
#
# Contient :
#   - dependency-audit  : pip-audit sur toutes les dépendances
#   - sast              : Bandit (SAST Python) + Semgrep
#   - secret-scan       : détection de secrets dans le code
#   - docker-scan       : Trivy sur l'image Docker
#   - sbom              : génération du Software Bill of Materials

name: Sécurité & Qualité

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 3 * * 0"    # Dimanche 03h00 UTC

env:
  PYTHON_VERSION: "3.10"
  REGISTRY:       ghcr.io
  IMAGE_NAME:     ${{ github.repository_owner }}/movielens-api

jobs:
  # ── 1. Audit des dépendances Python ─────────────────────────────────────
  dependency-audit:
    name: Audit Dépendances
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer pip-audit
        run: pip install pip-audit --quiet

      - name: Audit des dépendances (CVE)
        run: |
          pip-audit \
            --requirement <(grep -E "^[a-zA-Z]" pyproject.toml | \
                            grep -v "^\[" | \
                            sed 's/ *= *\"/==/;s/\"//;s/\^//') \
            --format json \
            --output audit-report.json \
            || true    # Ne pas échouer le job, juste rapporter

          # Afficher le résumé
          python3 -c "
          import json, sys
          try:
              with open('audit-report.json') as f:
                  report = json.load(f)
              vulns = report.get('vulnerabilities', [])
              critical = [v for v in vulns if v.get('severity') in ('CRITICAL', 'HIGH')]
              print(f'Total vulnérabilités : {len(vulns)}')
              print(f'CRITICAL/HIGH        : {len(critical)}')
              for v in critical:
                  print(f'  ⚠️  {v[\"name\"]} {v[\"version\"]} : {v[\"description\"][:80]}')
              if critical:
                  print('Des vulnérabilités CRITICAL/HIGH détectées — vérifier manuellement')
          except Exception as e:
              print(f'Rapport non disponible : {e}')
          "

      - name: Uploader le rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit
          path: audit-report.json

  # ── 2. SAST — Analyse statique du code Python ────────────────────────────
  sast:
    name: SAST (Bandit + Ruff)
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les outils
        run: pip install bandit ruff --quiet

      - name: Bandit — Analyse de sécurité
        run: |
          bandit \
            --recursive . \
            --exclude ".venv,data,models,airflow/logs,tests" \
            --severity-level medium \
            --confidence-level medium \
            --format json \
            --output bandit-report.json \
            || true

          # Résumé Bandit
          python3 -c "
          import json
          try:
              with open('bandit-report.json') as f:
                  r = json.load(f)
              res = r.get('results', [])
              high = [x for x in res if x['issue_severity'] == 'HIGH']
              med  = [x for x in res if x['issue_severity'] == 'MEDIUM']
              print(f'Problèmes HIGH   : {len(high)}')
              print(f'Problèmes MEDIUM : {len(med)}')
              for h in high:
                  print(f'  🔴 {h[\"filename\"]}:{h[\"line_number\"]} — {h[\"issue_text\"]}')
          except Exception as e:
              print(f'Rapport Bandit non disponible : {e}')
          "

      - name: Ruff — Règles de sécurité (S*)
        run: |
          ruff check . \
            --select S \
            --exclude ".venv,data,models" \
            --output-format json \
            > ruff-security.json 2>&1 || true
          cat ruff-security.json | python3 -c "
          import json, sys
          try:
              data = json.load(sys.stdin)
              issues = data if isinstance(data, list) else []
              print(f'Ruff S* issues : {len(issues)}')
              for i in issues[:5]:
                  print(f'  {i.get(\"filename\",\"\")}:{i.get(\"location\",{}).get(\"row\",\"?\")} — {i.get(\"message\",\"\")}')
          except: pass
          " || true

      - name: Uploader les rapports SAST
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sast-reports
          path: |
            bandit-report.json
            ruff-security.json

  # ── 3. Détection de secrets ──────────────────────────────────────────────
  secret-scan:
    name: Détection de Secrets
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0    # Historique complet pour Gitleaks

      - name: Gitleaks — scan des secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN:  ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        continue-on-error: true    # Alerter sans bloquer sur scan hebdo

      - name: Vérification manuelle des patterns sensibles
        run: |
          echo "🔍 Recherche de patterns sensibles..."
          FOUND=0

          # Clés AWS hardcodées
          if grep -rn "AKIA[0-9A-Z]\{16\}" --include="*.py" --include="*.yaml" \
                  --exclude-dir=".git" . 2>/dev/null | grep -v ".env.example"; then
            echo "⚠️  Clés AWS potentielles détectées"
            FOUND=1
          fi

          # Mots de passe en clair dans le code
          if grep -rn "password\s*=\s*['\"][^'\"]\+['\"]" --include="*.py" \
                  --exclude-dir=".git" --exclude-dir="tests" . 2>/dev/null \
                  | grep -v "env\|getenv\|os\.\|example\|test\|mock\|dummy"; then
            echo "⚠️  Mots de passe potentiellement en clair"
            FOUND=1
          fi

          # Tokens JWT
          if grep -rn "eyJ[A-Za-z0-9_-]*\.[A-Za-z0-9_-]*\." --include="*.py" \
                  --exclude-dir=".git" . 2>/dev/null; then
            echo "⚠️  Tokens JWT potentiels"
            FOUND=1
          fi

          if [ $FOUND -eq 0 ]; then
            echo "✅ Aucun secret détecté"
          fi

  # ── 4. Scan Docker avec Trivy ────────────────────────────────────────────
  docker-scan:
    name: Scan Image Docker (Trivy)
    runs-on: ubuntu-22.04
    # Seulement si une image a été buildée (push sur main ou cron)
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - uses: actions/checkout@v4

      - name: Build l'image Docker localement
        run: |
          docker build \
            -f infrastructure/docker/fastapi/Dockerfile \
            -t movielens-api:scan \
            . \
            --quiet

      - name: Trivy — Scan vulnérabilités image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref:    movielens-api:scan
          format:       sarif
          output:       trivy-results.sarif
          severity:     CRITICAL,HIGH
          exit-code:    0    # Ne pas bloquer, juste rapporter
          ignore-unfixed: true

      - name: Upload résultats Trivy → GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category:   trivy-docker

      - name: Résumé Trivy (JSON)
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:latest image \
            --format json \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            movielens-api:scan \
            > trivy-report.json 2>/dev/null || true

          python3 -c "
          import json
          try:
              with open('trivy-report.json') as f:
                  r = json.load(f)
              total = sum(
                  len(res.get('Vulnerabilities') or [])
                  for res in r.get('Results', [])
              )
              print(f'Vulnérabilités CRITICAL/HIGH : {total}')
          except: pass
          " || true

      - name: Uploader le rapport
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-docker-report
          path: trivy-report.json

  # ── 5. Génération du SBOM ────────────────────────────────────────────────
  sbom:
    name: Générer le SBOM
    runs-on: ubuntu-22.04
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Installer les dépendances du projet
        run: |
          pip install \
            scikit-learn==1.3.2 \
            pandas==2.1.4 \
            numpy==1.26.3 \
            fastapi==0.110.0 \
            pydantic==2.6.4 \
            mlflow==2.9.2 \
            --quiet

      - name: Générer le SBOM (CycloneDX)
        run: |
          pip install cyclonedx-bom --quiet
          cyclonedx-py pip \
            --output-format json \
            > sbom.json 2>/dev/null || \
          python3 -c "
          import json, subprocess, sys
          result = subprocess.run(
              [sys.executable, '-m', 'pip', 'list', '--format', 'json'],
              capture_output=True, text=True
          )
          pkgs = json.loads(result.stdout)
          sbom = {
              'bomFormat':  'CycloneDX',
              'specVersion': '1.4',
              'version': 1,
              'components': [
                  {'type': 'library', 'name': p['name'], 'version': p['version']}
                  for p in pkgs
              ]
          }
          with open('sbom.json', 'w') as f:
              json.dump(sbom, f, indent=2)
          print(f'SBOM généré : {len(pkgs)} composants')
          "

      - name: Uploader le SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json
          retention-days: 90

  # ── 6. Résumé sécurité ───────────────────────────────────────────────────
  security-summary:
    name: Résumé Sécurité
    runs-on: ubuntu-22.04
    needs: [dependency-audit, sast, secret-scan]
    if: always()

    steps:
      - name: Résumé global
        run: |
          echo "## 🔒 Rapport Sécurité" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Statut |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Audit dépendances | ${{ needs.dependency-audit.result == 'success' && '✅' || '⚠️' }} ${{ needs.dependency-audit.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| SAST Bandit/Ruff  | ${{ needs.sast.result == 'success' && '✅' || '⚠️' }} ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Scan secrets      | ${{ needs.secret-scan.result == 'success' && '✅' || '🔴' }} ${{ needs.secret-scan.result }} |" >> $GITHUB_STEP_SUMMARY
